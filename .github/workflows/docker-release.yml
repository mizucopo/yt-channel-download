name: Docker Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  docker-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read version
        id: version
        run: |
          echo "version=$(awk -F'\"' '/^version *=/ {print $2}' pyproject.toml)" >> "$GITHUB_OUTPUT"

      - name: Read git author
        id: author
        run: |
          echo "name=$(git log -1 --format=%an)" >> $GITHUB_OUTPUT
          echo "email=$(git log -1 --format=%ae)" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config user.name "${{ steps.author.outputs.name }}"
          git config user.email "${{ steps.author.outputs.email }}"

      - name: Check if tag exists
        run: |
          git fetch --tags
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            199426002319.dkr.ecr.us-east-1.amazonaws.com/yt-live-download:latest
            199426002319.dkr.ecr.us-east-1.amazonaws.com/yt-live-download:${{ steps.version.outputs.version }}

      - name: Create and push git tag
        run: |
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "Release ${{ steps.version.outputs.version }}" \
            --notes "## Docker Image

          Pull the Docker image:

          \`\`\`bash
          aws ecr get-login-password --region us-east-1 | \\
            docker login --username AWS --password-stdin 199426002319.dkr.ecr.us-east-1.amazonaws.com
          docker pull 199426002319.dkr.ecr.us-east-1.amazonaws.com/yt-live-download:${{ steps.version.outputs.version }}
          \`\`\`

          Or use the latest tag:

          \`\`\`bash
          aws ecr get-login-password --region us-east-1 | \\
            docker login --username AWS --password-stdin 199426002319.dkr.ecr.us-east-1.amazonaws.com
          docker pull 199426002319.dkr.ecr.us-east-1.amazonaws.com/yt-live-download:latest
          \`\`\`

          ## Links:
          - [ECR](https://us-east-1.console.aws.amazon.com/ecr/repositories/private/199426002319/yt-live-download/_/details?region=us-east-1)
          - [Source Code](${{ github.server_url }}/${{ github.repository }}/tree/${{ steps.version.outputs.version }})
          "
